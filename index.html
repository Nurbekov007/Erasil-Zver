<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жалпы Химия — Емтиханға дайындық</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#7c3aed;--purple-light:#ede9fe;--purple-dark:#5b21b6;
  --green:#059669;--green-light:#d1fae5;
  --red:#dc2626;--red-light:#fee2e2;
  --blue:#2563eb;--blue-light:#dbeafe;
  --amber:#d97706;--amber-light:#fef3c7;
  --bg:#f5f3ff;--card:#fff;--text:#1e1b4b;--muted:#6b7280;
  --border:#e5e7eb;--radius:16px;
}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3,.logo{font-family:'Nunito',sans-serif}

/* MENU */
#menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 50%,#a78bfa 100%)}
.menu-card{background:#fff;border-radius:24px;padding:3rem 2.5rem;max-width:680px;width:100%;box-shadow:0 25px 60px rgba(76,29,149,0.3)}
.logo{font-size:2.2rem;font-weight:900;color:var(--purple);margin-bottom:.3rem;text-align:center}
.logo span{color:var(--amber)}
.subtitle{text-align:center;color:var(--muted);font-size:1rem;margin-bottom:2rem}
.credit{text-align:center;font-size:.85rem;color:var(--purple);font-weight:700;margin-bottom:2rem;letter-spacing:.5px}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-bottom:2rem}
.topic-btn{background:var(--purple-light);border:2px solid transparent;border-radius:12px;padding:.8rem 1rem;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;color:var(--purple-dark);transition:all .2s;text-align:left;display:flex;align-items:center;gap:.5rem}
.topic-btn:hover{background:var(--purple);color:#fff;transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,.3)}
.topic-btn.selected{background:var(--purple);color:#fff;border-color:var(--purple-dark)}
.topic-btn .count{font-size:.75rem;opacity:.7;margin-left:auto}
.start-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn-start{background:var(--purple);color:#fff;border:none;border-radius:12px;padding:.9rem 2.5rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;cursor:pointer;transition:all .2s}
.btn-start:hover{background:var(--purple-dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.4)}
.btn-all{background:var(--amber);color:#fff}
.btn-all:hover{background:#b45309}
.info-pills{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem}
.pill{background:var(--purple-light);color:var(--purple-dark);border-radius:99px;padding:.3rem .9rem;font-size:.8rem;font-weight:700}

/* QUIZ */
#quiz{display:none;min-height:100vh;flex-direction:column}
.quiz-header{background:#fff;border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.header-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.2rem;color:var(--purple)}
.progress-wrap{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.progress-bar{background:var(--purple);height:100%;border-radius:99px;transition:width .4s ease}
.score-badge{background:var(--purple-light);color:var(--purple);border-radius:99px;padding:.3rem .8rem;font-weight:700;font-size:.85rem;white-space:nowrap}
.btn-finish-top{background:var(--red-light);color:var(--red);border:none;border-radius:10px;padding:.4rem 1rem;font-weight:700;font-size:.82rem;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.btn-finish-top:hover{background:var(--red);color:#fff}

.quiz-body{flex:1;padding:2rem 1rem;max-width:780px;margin:0 auto;width:100%}
.q-counter{font-size:.85rem;color:var(--muted);font-weight:700;margin-bottom:.5rem}
.q-topic{display:inline-block;background:var(--purple-light);color:var(--purple);border-radius:8px;padding:.2rem .7rem;font-size:.78rem;font-weight:700;margin-bottom:.8rem}
.q-text{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:1.5rem;line-height:1.5;background:#fff;border-radius:16px;padding:1.2rem 1.4rem;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.options-grid{display:grid;gap:.75rem;margin-bottom:1.5rem}
.opt{background:#fff;border:2px solid var(--border);border-radius:12px;padding:1rem 1.2rem;cursor:pointer;font-size:.95rem;font-weight:600;color:var(--text);transition:all .2s;display:flex;align-items:center;gap:.75rem;text-align:left}
.opt:hover:not(.locked){border-color:var(--purple);background:var(--purple-light);transform:translateY(-1px)}
.opt .opt-letter{width:32px;height:32px;border-radius:8px;background:var(--purple-light);color:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0}
.opt.correct{background:var(--green-light);border-color:var(--green)}
.opt.correct .opt-letter{background:var(--green);color:#fff}
.opt.wrong{background:var(--red-light);border-color:var(--red)}
.opt.wrong .opt-letter{background:var(--red);color:#fff}
.opt.locked{cursor:default}
.feedback{border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.5rem;font-weight:700;display:none;align-items:center;gap:.5rem}
.feedback.show{display:flex}
.feedback.correct-fb{background:var(--green-light);color:var(--green)}
.feedback.wrong-fb{background:var(--red-light);color:var(--red)}
.btn-next{background:var(--purple);color:#fff;border:none;border-radius:12px;padding:.9rem 2.5rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;display:none;transition:all .2s}
.btn-next:hover{background:var(--purple-dark)}
.btn-next.show{display:inline-block}

/* RESULTS */
#results{display:none;min-height:100vh;background:linear-gradient(135deg,#4c1d95,#7c3aed);align-items:center;justify-content:center;padding:2rem}
.results-card{background:#fff;border-radius:24px;padding:3rem 2.5rem;max-width:600px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.results-emoji{font-size:4rem;margin-bottom:1rem}
.results-title{font-size:2rem;font-weight:900;color:var(--purple);margin-bottom:.5rem}
.score-circle{width:140px;height:140px;border-radius:50%;background:var(--purple);margin:1.5rem auto;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:2.5rem;font-weight:900;color:#fff;font-family:'Nunito',sans-serif}
.score-total{font-size:.9rem;color:rgba(255,255,255,.7)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.5rem 0}
.stat{background:var(--bg);border-radius:12px;padding:1rem}
.stat-val{font-size:1.5rem;font-weight:900;font-family:'Nunito',sans-serif}
.stat-label{font-size:.75rem;color:var(--muted);font-weight:600}
.stat.g .stat-val{color:var(--green)}
.stat.r .stat-val{color:var(--red)}
.stat.b .stat-val{color:var(--blue)}
.btn-restart{background:var(--purple);color:#fff;border:none;border-radius:12px;padding:.9rem 2.5rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;cursor:pointer;margin-top:1rem;transition:all .2s}
.btn-restart:hover{background:var(--purple-dark)}
.topic-breakdown{text-align:left;margin-top:1.5rem}
.topic-breakdown h3{font-size:.9rem;font-weight:700;color:var(--muted);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.5px}
.tb-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;font-size:.85rem}
.tb-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:6px}
.tb-bar{height:100%;border-radius:99px;background:var(--purple);transition:width .6s}

@media(max-width:600px){
.topics-grid{grid-template-columns:1fr 1fr}
.q-text{font-size:1rem}
.opt{font-size:.88rem}
.stats-row{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menu">
  <div class="menu-card">
    <div class="logo">⚗️ Жалпы Химия<span>.</span></div>
    <div class="subtitle">Емтиханға дайындық тесті • 300+ сұрақ</div>
    <div class="credit">✨ Created by Altynbek</div>
    <div class="info-pills">
      <span class="pill">🎯 12 тақырып</span>
      <span class="pill">📝 300+ сұрақ</span>
      <span class="pill">✅ Дұрыс жауаптар</span>
      <span class="pill">📊 Нәтиже</span>
    </div>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem;font-weight:600">Тақырыптарды таңдаңыз немесе барлығын бастаңыз:</p>
    <div class="topics-grid" id="topicsGrid"></div>
    <div class="start-row">
      <button class="btn-start btn-all" onclick="startQuiz('all')">🚀 Барлық сұрақтар</button>
      <button class="btn-start" onclick="startSelected()">📌 Таңдалғандарды бастау</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none;flex-direction:column">
  <div class="quiz-header">
    <div class="header-logo">⚗️ Химия</div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="score-badge" id="scoreBadge">0 / 0</div>
    <button class="btn-finish-top" onclick="finishEarly()">⏹ Аяқтау</button>
  </div>
  <div class="quiz-body">
    <div class="q-counter" id="qCounter"></div>
    <div class="q-topic" id="qTopic"></div>
    <div class="q-text" id="qText"></div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Келесі сұрақ →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" style="display:none;align-items:center;justify-content:center">
  <div class="results-card">
    <div class="results-emoji" id="resEmoji">🎉</div>
    <div class="results-title">Тест аяқталды!</div>
    <div class="score-circle">
      <div class="score-num" id="resPct">0%</div>
      <div class="score-total" id="resRatio">0 / 0</div>
    </div>
    <div class="stats-row">
      <div class="stat g"><div class="stat-val" id="resCorrect">0</div><div class="stat-label">✅ Дұрыс</div></div>
      <div class="stat r"><div class="stat-val" id="resWrong">0</div><div class="stat-label">❌ Қате</div></div>
      <div class="stat b"><div class="stat-val" id="resTotal">0</div><div class="stat-label">📝 Барлығы</div></div>
    </div>
    <div class="topic-breakdown" id="topicBreakdown"></div>
    <button class="btn-restart" onclick="goMenu()">🏠 Басты менюге</button>
  </div>
</div>

<script>
const TOPICS = {
  "1. Атом құрылысы": [
    {q:"²⁷₁₃Э атомындағы протон саны қанша?",opts:["13","27","14","8"],ans:0},
    {q:"²⁷₁₃Э атомындағы нейтрон саны қанша?",opts:["14","13","27","8"],ans:0},
    {q:"²⁷₁₃Э атомындағы электрон саны қанша?",opts:["13","27","14","8"],ans:0},
    {q:"²⁷₁₃Э — бұл қандай элемент?",opts:["Алюминий","Темір","Кремний","Азот"],ans:0},
  ],
  "2. Бейорганикалық қосылыстар": [
    {q:"Тек оксидтерден тұратын қатарды көрсетіңіз:",opts:["KOH, CO₂, NaCl, MgO","CaO, SO₂, Al₂O₃, P₂O₅","H₂O, H₂SO₄, NO, BaO","FeO, CuCl₂, Li₂O, K₂O"],ans:1},
    {q:"Тек қышқылдардан тұратын қатарды анықтаңыз:",opts:["NaOH, HCl, KBr, H₂CO₃","H₂S, NaCl, H₂SiO₃, KOH","HCl, H₂SO₄, HNO₃, H₃PO₄","HNO₂, H₂O, MgCl₂, HBr"],ans:2},
    {q:"Ерімейтін негіздер орналасқан қатарды белгілеңіз:",opts:["NaOH, KOH, LiOH, Ba(OH)₂","Cu(OH)₂, Fe(OH)₃, Al(OH)₃, Mg(OH)₂","Ca(OH)₂, NH₄OH, Fe(OH)₂, NaOH","Zn(OH)₂, KOH, Ni(OH)₂, LiOH"],ans:1},
    {q:"Тек негіздерден тұратын қатарды таңдаңыз:",opts:["Al(OH)₃, NaCl, Ba(OH)₂, H₂O","NaOH, Ca(OH)₂, KOH, Fe(OH)₃","LiOH, MgO, Cu(OH)₂, HCl","Zn(OH)₂, K₂SO₄, NaOH, CO₂"],ans:1},
    {q:"Негіздік оксидтер орналасқан қатарды белгілеңіз:",opts:["Na₂O, CaO, MgO, BaO","SO₃, P₂O₅, Al₂O₃, Li₂O","CO₂, NO, K₂O, FeO","SiO₂, CrO₃, BeO, ZnO"],ans:0},
    {q:"Тек оттекті қышқылдар орналасқан қатар:",opts:["HCl, HBr, HI, H₂S","H₂SO₄, HNO₃, H₂CO₃, H₃PO₄","HNO₂, HF, H₂SO₃, HCl","HClO₄, H₂S, HNO₃, H₂SiO₃"],ans:1},
    {q:"Тек тұздардан тұратын қатарды көрсетіңіз:",opts:["BaSO₄, HCl, Na₂O, KOH","AgNO₃, Cu(OH)₂, FeS, MgO","NaCl, K₂SO₄, CaCO₃, AlCl₃","LiBr, H₃PO₄, ZnCl₂, SO₃"],ans:2},
    {q:"Қышқылдық оксидтер орналасқан қатарды көрсетіңіз:",opts:["CaO, SiO₂, CrO₃, Na₂O","CO₂, SO₂, P₂O₅, N₂O₅","NO₂, SO₃, MgO, Al₂O₃","Cl₂O, BaO, CO, P₂O₃"],ans:1},
    {q:"Амфотерлі (екідайлы) оксидтер орналасқан қатарды табыңыз:",opts:["Na₂O, MgO, Al₂O₃, CaO","SO₂, NO₂, P₂O₅, ZnO","ZnO, Al₂O₃, BeO, Cr₂O₃","FeO, Fe₂O₃, PbO, Li₂O"],ans:2},
    {q:"Тек оттексіз қышқылдар орналасқан қатарды көрсетіңіз:",opts:["HNO₃, H₂SO₄, HCl, HF","HCl, HBr, HI, H₂S","H₃PO₄, HBr, HI, H₂CO₃","H₂S, H₂SO₃, HCl, HCN"],ans:1},
    {q:"Еритін негіздер (сілтілер) орналасқан қатарды таңдаңыз:",opts:["Cu(OH)₂, Al(OH)₃, KOH, Mg(OH)₂","LiOH, NaOH, KOH, Ba(OH)₂","Fe(OH)₃, Zn(OH)₂, NaOH, Ca(OH)₂","LiOH, Ni(OH)₂, Cr(OH)₃, AgOH"],ans:1},
    {q:"Тек орта тұздар орналасқан қатарды көрсетіңіз:",opts:["NaHCO₃, KHSO₄, NaCl, LiCl","Na₂SO₄, KCl, CaCO₃, Mg(NO₃)₂","Al(OH)Cl₂, K₃PO₄, Na₂CO₃, CaSO₄","ZnCl₂, CuOHCl, MgBr₂, AgNO₃"],ans:1},
    {q:"Тек екі негізді қышқылдар орналасқан қатарды белгілеңіз:",opts:["HCl, HNO₃, H₃PO₄, H₂SO₃","H₂SO₄, H₂CO₃, H₂S, H₂SiO₃","H₂SO₄, HI, H₂S, HNO₂","H₂CO₃, H₃PO₄, HF, H₂SO₃"],ans:1},
    {q:"Тек негіздік тұздар орналасқан қатар:",opts:["CuOHCl, (FeOH)₂SO₄, Al(OH)₂Cl, MgOHNO₃","NaCl, CuSO₄, AlCl₃, Zn(OH)₂","NaOH, CuOHCl, Na₂SO₄, BaCl₂","FeOHCl₂, Mg(OH)₂, K₂HPO₄, LiBr"],ans:0},
    {q:"Тек қышқылдық тұздар орналасқан қатарды табыңыз:",opts:["NaCl, K₂SO₄, LiHCO₃, MgCl₂","NaHCO₃, KHSO₄, NaH₂PO₄, Ca(HS)₂","CaHPO₄, Na₂CO₃, KHSO₃, AlPO₄","NH₄Cl, (NH₄)₂HPO₄, BaSO₄, NaHS"],ans:1},
    {q:"Тек бір негізді қышқылдар орналасқан қатар:",opts:["H₂SO₄, HCl, HNO₂, HI","HCl, HNO₃, HF, HBr","H₃PO₄, HNO₃, H₂S, HCl","HClO₄, HF, H₂CO₃, HI"],ans:1},
    {q:"Тек үш негізді қышқылдар кездесетін қатарды табыңыз:",opts:["H₂SO₄, HCl, H₃PO₄, HNO₃","H₃PO₄, H₂CO₃, H₂SiO₃, HI","H₃PO₄, H₃AsO₄, H₃BO₃, H₃SbO₄","H₂S, H₂SO₃, H₃PO₄, HF"],ans:2},
    {q:"Тек тұз түзбейтін оксидтер орналасқан қатарды көрсетіңіз:",opts:["CO₂, SO₂, P₂O₅, NO","CaO, MgO, Na₂O, N₂O","CO, NO, N₂O, SiO","SiO₂, Al₂O₃, ZnO, CO"],ans:2},
    {q:"Металл валенттілігі II болатын оксидтер қатарын анықтаңыз:",opts:["Na₂O, K₂O, Li₂O, Ag₂O","MgO, CaO, FeO, CuO","Al₂O₃, Cr₂O₃, Fe₂O₃, B₂O₃","SO₂, CO₂, SiO₂, MnO₂"],ans:1},
    {q:"Суда жақсы еритін тұздар қатарын таңдаңыз:",opts:["BaSO₄, AgCl, CaCO₃, PbS","NaCl, KNO₃, AgNO₃, NH₄Cl","Na₂CO₃, Mg₃(PO₄)₂, KCl, FeS","LiBr, AlPO₄, ZnSO₄, Ca₃(PO₄)₂"],ans:1},
  ],
  "3. Химияның негізгі заңдары": [
    {q:"Массасы 8 г оттегі (O₂) газының зат мөлшері (моль):",opts:["0.25 моль","0.5 моль","1 моль","2 моль"],ans:0},
    {q:"Қалыпты жағдайда 5,6 л метан (CH₄) газының зат мөлшері:",opts:["0.5 моль","0.25 моль","1 моль","2 моль"],ans:1},
    {q:"3 моль судың (H₂O) массасы:",opts:["54 г","36 г","18 г","48 г"],ans:0},
    {q:"1,204 × 10²³ молекуласы бар CO₂ газының зат мөлшері:",opts:["0.2 моль","0.5 моль","1 моль","2 моль"],ans:0},
    {q:"Қалыпты жағдайда 2 моль азот (N₂) газының алатын көлемі:",opts:["44,8 л","22,4 л","11,2 л","5,6 л"],ans:0},
    {q:"Массасы 40 г натрий гидроксидінің (NaOH) зат мөлшері:",opts:["1 моль","2 моль","0.5 моль","4 моль"],ans:0},
    {q:"0,5 моль күкірт (VI) оксидіндегі (SO₃) молекула саны:",opts:["3,01 × 10²³","6,02 × 10²³","1,5 × 10²³","1,2 × 10²⁴"],ans:0},
    {q:"Қалыпты жағдайда 11,2 л сутегі (H₂) газының массасы:",opts:["1 г","2 г","0,5 г","4 г"],ans:0},
    {q:"Массасы 56 г темірдегі (Fe) атом саны:",opts:["6,02 × 10²³","3,01 × 10²³","1,2 × 10²⁴","2,4 × 10²⁴"],ans:0},
    {q:"0,1 моль күкірт қышқылының (H₂SO₄) массасы:",opts:["9,8 г","19,6 г","4,9 г","98 г"],ans:0},
    {q:"Қалыпты жағдайда 67,2 л аммиак (NH₃) газының зат мөлшері:",opts:["3 моль","6 моль","1,5 моль","9 моль"],ans:0},

let questions = [];
let current = 0;
let score = 0;
let answered = false;
let topicStats = {};
let selectedTopics = new Set();

function buildTopicsGrid(){
  const grid = document.getElementById('topicsGrid');
  Object.entries(TOPICS).forEach(([name, qs])=>{
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.innerHTML = `<span>${name}</span><span class="count">${qs.length}</span>`;
    btn.onclick = ()=>{
      if(selectedTopics.has(name)){selectedTopics.delete(name);btn.classList.remove('selected')}
      else{selectedTopics.add(name);btn.classList.add('selected')}
    };
    grid.appendChild(btn);
  });
}

function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

function startQuiz(mode){
  let pool = [];
  if(mode==='all'){
    Object.entries(TOPICS).forEach(([topic,qs])=>{
      qs.forEach(q=>pool.push({...q,topic}));
      topicStats[topic]={correct:0,total:qs.length};
    });
  } else {
    if(selectedTopics.size===0){alert('Тақырып таңдаңыз!');return;}
    selectedTopics.forEach(topic=>{
      TOPICS[topic].forEach(q=>pool.push({...q,topic}));
      topicStats[topic]={correct:0,total:TOPICS[topic].length};
    });
  }
  questions = shuffle(pool);
  current = 0; score = 0;
  document.getElementById('menu').style.display='none';
  document.getElementById('quiz').style.display='flex';
  showQuestion();
}

function startSelected(){startQuiz('selected')}

function showQuestion(){
  const q = questions[current];
  const total = questions.length;
  document.getElementById('qCounter').textContent = `Сұрақ ${current+1} / ${total}`;
  document.getElementById('qTopic').textContent = q.topic;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressBar').style.width = ((current/total)*100)+'%';
  document.getElementById('scoreBadge').textContent = `${score} / ${current}`;
  const opts = document.getElementById('optionsGrid');
  opts.innerHTML='';
  const letters=['A','B','C','D'];
  const shuffled = q.opts.map((o,i)=>({o,i}));
  // keep original order for correct answer tracking
  shuffled.forEach((item,idx)=>{
    const div = document.createElement('div');
    div.className='opt';
    div.innerHTML=`<span class="opt-letter">${letters[idx]}</span><span>${item.o}</span>`;
    div.onclick=()=>selectAnswer(idx, item.i===q.ans, div);
    opts.appendChild(div);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').textContent='';
  document.getElementById('btnNext').className='btn-next';
  answered=false;
}

function selectAnswer(idx, isCorrect, el){
  if(answered) return;
  answered=true;
  const opts = document.querySelectorAll('.opt');
  const q = questions[current];
  // find correct display index
  let correctDisplayIdx = q.ans; // since we're not shuffling options
  opts.forEach((o,i)=>{
    o.classList.add('locked');
    // The option at position i corresponds to q.opts[i] since we keep order
    if(i===q.ans) o.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  if(isCorrect){
    el.classList.add('correct');
    score++;
    topicStats[q.topic].correct++;
    fb.className='feedback correct-fb show';
    fb.textContent='✅ Дұрыс жауап!';
  } else {
    el.classList.add('wrong');
    fb.className='feedback wrong-fb show';
    fb.textContent=`❌ Қате. Дұрыс жауап: ${q.opts[q.ans]}`;
  }
  document.getElementById('btnNext').className='btn-next show';
}

function nextQuestion(){
  current++;
  if(current>=questions.length){showResults();return;}
  showQuestion();
}

function finishEarly(){
  if(confirm('Тестті аяқтауға сенімдісіз бе?')) showResults();
}

function showResults(){
  document.getElementById('quiz').style.display='none';
  const res = document.getElementById('results');
  res.style.display='flex';
  const total = current;
  const pct = total>0?Math.round((score/total)*100):0;
  document.getElementById('resPct').textContent=pct+'%';
  document.getElementById('resRatio').textContent=`${score} / ${total}`;
  document.getElementById('resCorrect').textContent=score;
  document.getElementById('resWrong').textContent=total-score;
  document.getElementById('resTotal').textContent=total;
  let emoji='🎉';
  if(pct>=90) emoji='🏆';
  else if(pct>=70) emoji='👍';
  else if(pct>=50) emoji='📚';
  else emoji='💪';
  document.getElementById('resEmoji').textContent=emoji;

  // topic breakdown
  const bd = document.getElementById('topicBreakdown');
  let html='<h3>Тақырыптар бойынша нәтиже</h3>';
  Object.entries(topicStats).forEach(([topic,s])=>{
    if(s.total===0) return;
    const p = Math.round((s.correct/s.total)*100);
    html+=`<div class="tb-row"><span style="font-size:.78rem;min-width:180px;color:var(--text)">${topic}</span><div class="tb-bar-wrap"><div class="tb-bar" style="width:${p}%"></div></div><span style="font-size:.78rem;font-weight:700;min-width:60px;text-align:right">${s.correct}/${s.total}</span></div>`;
  });
  bd.innerHTML=html;
}

function goMenu(){
  document.getElementById('results').style.display='none';
  document.getElementById('menu').style.display='flex';
  topicStats={};
  selectedTopics=new Set();
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('selected'));
}

buildTopicsGrid();
</script>
</body>
</html>
