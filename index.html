<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Chemistry Quiz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #334155;
}

header h1{
    font-size:32px;
}

header p{
    color:#94a3b8;
    margin-top:5px;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#3b82f6;
}

.quiz-box{
    display:none;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}

.question{
    font-size:24px;
    margin-bottom:25px;
    line-height:1.5;
}

.answers{
    display:grid;
    gap:15px;
}

.answer-btn{
    background:#334155;
    border:none;
    color:white;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    transition:0.2s;
    font-size:17px;
    text-align:left;
}

.answer-btn:hover{
    background:#475569;
}

.correct{
    background:#16a34a !important;
}

.wrong{
    background:#dc2626 !important;
}

.next-btn,
.finish-btn,
.back-btn{
    margin-top:25px;
    padding:14px 25px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.next-btn{
    background:#2563eb;
    color:white;
}

.finish-btn{
    background:#dc2626;
    color:white;
}

.back-btn{
    background:#475569;
    color:white;
}

.result-box{
    display:none;
    text-align:center;
    padding:40px;
}

.result-box h2{
    font-size:38px;
    margin-bottom:20px;
}

.result-box p{
    font-size:24px;
    margin-bottom:15px;
}

.explanation{
    margin-top:20px;
    background:#0f172a;
    padding:20px;
    border-radius:15px;
    color:#cbd5e1;
}
</style>
</head>

<body>

<header>
    <h1>🧪 General Chemistry Quiz</h1>
    <p>Created by Altynbek</p>
</header>

<div class="container">

    <!-- MENU -->
    <div class="menu" id="menu">

        <div class="card" onclick="startQuiz('oxides')">
            <h2>Бейорганикалық қосылыстар</h2>
            <p>Оксидтер, қышқылдар, негіздер</p>
        </div>

        <div class="card" onclick="startQuiz('electrolytes')">
            <h2>Электролиттер</h2>
            <p>Күшті және әлсіз электролиттер</p>
        </div>

        <div class="card" onclick="startQuiz('equilibrium')">
            <h2>Химиялық тепе-теңдік</h2>
            <p>Le Chatelier принципі</p>
        </div>

        <div class="card" onclick="startQuiz('ph')">
            <h2>pH есептері</h2>
            <p>Сутектік көрсеткіш</p>
        </div>

    </div>

    <!-- QUIZ -->
    <div class="quiz-box" id="quizBox">

        <div class="top-bar">
            <h2 id="topicTitle"></h2>
            <h3 id="score">Score: 0</h3>
        </div>

        <div class="question" id="question"></div>

        <div class="answers" id="answers"></div>

        <div class="explanation" id="explanation" style="display:none"></div>

        <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none">
            Келесі сұрақ →
        </button>

        <button class="finish-btn" onclick="finishQuiz()">
            Завершить тест
        </button>

    </div>

    <!-- RESULT -->
    <div class="result-box" id="resultBox">
        <h2>Тест аяқталды</h2>
        <p id="finalScore"></p>

        <button class="back-btn" onclick="goMenu()">
            Главный меню
        </button>
    </div>

</div>

<script>

const quizzes = {

oxides: [
{
question:"Тек оксидтерден тұратын қатарды көрсетіңіз:",
answers:[
"KOH, CO2, NaCl, MgO",
"CaO, SO2, Al2O3, P2O5",
"H2O, H2SO4, NO, BaO",
"FeO, CuCl2, Li2O, K2O"
],
correct:1
},

{
question:"Тек қышқылдардан тұратын қатар:",
answers:[
"HCl, H2SO4, HNO3, H3PO4",
"HNO2, H2O, MgCl2, HBr",
"H2SO3, HF, Na2O, HI",
"NaOH, HCl, KBr, H2CO3"
],
correct:0
},

{
question:"Еритін негіздер (сілтілер) қатары:",
answers:[
"LiOH, NaOH, KOH, Ba(OH)2",
"Cu(OH)2, Al(OH)3, KOH, Mg(OH)2",
"Fe(OH)3, Zn(OH)2, NaOH, Ca(OH)2",
"NH4OH, Mg(OH)2, Be(OH)2, KOH"
],
correct:0
}
],

electrolytes: [

{
question:"Күшті электролиттер қатары:",
answers:[
"H2O, CH3COOH, NH4OH",
"HCl, Ba(OH)2, KNO3",
"H2S, Cu(OH)2, BaSO4",
"HF, Mg(OH)2, AgCl"
],
correct:1
},

{
question:"Әлсіз электролиттер қатары:",
answers:[
"H2S, NH4OH, HNO2",
"HCl, NaOH, KCl",
"HNO3, KOH, NaNO3",
"H2SO4, LiOH, BaCl2"
],
correct:0
},

{
question:"Күшті негіздердің қатары:",
answers:[
"Fe(OH)3, Cu(OH)2, Al(OH)3",
"KOH, NaOH, LiOH",
"NH4OH, Zn(OH)2, Mg(OH)2",
"Cr(OH)3, Be(OH)2, Ni(OH)2"
],
correct:1
}
],

equilibrium:[

{
question:"2SO2 + O2 ⇌ 2SO3 + Q жүйесінде температураны көтерсе:",
answers:[
"Оңға ығысады",
"Солға ығысады",
"Өзгермейді",
"Қысым артады"
],
correct:1
},

{
question:"N2 + 3H2 ⇌ 2NH3 + Q реакциясында аммиак шығымын арттыру үшін:",
answers:[
"Қысымды арттыру және температураны төмендету",
"Қысымды төмендету",
"Температураны арттыру",
"Тек катализатор қосу"
],
correct:0
},

{
question:"2CO + O2 ⇌ 2CO2 + Q реакциясында қысымды арттырса:",
answers:[
"Солға ығысады",
"Оңға ығысады",
"Өзгермейді",
"Температура төмендейді"
],
correct:1
}
],

ph:[

{
question:"[H+] = 10⁻² моль/л болса, pH неге тең?",
answers:[
"2",
"12",
"7",
"4"
],
correct:0,
explanation:"pH = -log[H+] = -log(10⁻²) = 2"
},

{
question:"pOH = 1 болса, pH:",
answers:[
"1",
"13",
"7",
"14"
],
correct:1,
explanation:"pH + pOH = 14 → pH = 14 - 1 = 13"
},

{
question:"[OH-] = 10⁻⁴ моль/л болса, pH:",
answers:[
"4",
"10",
"7",
"14"
],
correct:1,
explanation:"pOH = 4 → pH = 14 - 4 = 10"
}
]

};

let currentQuiz = [];
let currentQuestion = 0;
let score = 0;

function startQuiz(topic){

document.getElementById("menu").style.display="none";
document.getElementById("quizBox").style.display="block";

currentQuiz = quizzes[topic];
currentQuestion = 0;
score = 0;

document.getElementById("score").innerText = "Score: 0";
document.getElementById("topicTitle").innerText = topic.toUpperCase();

showQuestion();
}

function showQuestion(){

const q = currentQuiz[currentQuestion];

document.getElementById("question").innerText = q.question;

const answersDiv = document.getElementById("answers");
answersDiv.innerHTML="";

document.getElementById("nextBtn").style.display="none";

document.getElementById("explanation").style.display="none";

q.answers.forEach((answer,index)=>{

const btn = document.createElement("button");

btn.classList.add("answer-btn");

btn.innerText = answer;

btn.onclick = ()=>checkAnswer(index, btn);

answersDiv.appendChild(btn);

});

}

function checkAnswer(index, btn){

const q = currentQuiz[currentQuestion];

const buttons = document.querySelectorAll(".answer-btn");

buttons.forEach(b=>b.disabled=true);

if(index === q.correct){

btn.classList.add("correct");
score++;

}else{

btn.classList.add("wrong");
buttons[q.correct].classList.add("correct");

}

document.getElementById("score").innerText = "Score: " + score;

if(q.explanation){

const exp = document.getElementById("explanation");
exp.style.display="block";
exp.innerText = q.explanation;

}

document.getElementById("nextBtn").style.display="inline-block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < currentQuiz.length){

showQuestion();

}else{

finishQuiz();

}

}

function finishQuiz(){

document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("finalScore").innerText =
"Сіздің нәтижеңіз: " + score + " / " + currentQuiz.length;

}

function goMenu(){

document.getElementById("resultBox").style.display="none";
document.getElementById("menu").style.display="grid";

}

</script>

</body>
</html>
