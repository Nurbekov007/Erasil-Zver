<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ерасыл — Легенда CS2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Raleway:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Raleway', sans-serif;
    position: relative;
  }

  /* Floating stars background */
  .stars-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    opacity: 0;
    animation: floatStar linear infinite;
  }

  @keyframes floatStar {
    0%   { opacity: 0; transform: translateY(110vh) rotate(0deg) scale(0.5); }
    10%  { opacity: 1; }
    90%  { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(-20vh) rotate(360deg) scale(1.2); }
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 48px;
    width: 100%;
    max-width: 420px;
  }

  /* Photo frame */
  .photo-wrapper {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 32px;
  }

  .photo-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: conic-gradient(
      #FFD700 0%, #FFF8DC 25%, #DAA520 50%, #FFD700 75%, #FFF8DC 100%
    );
    animation: spinRing 6s linear infinite;
    z-index: 1;
  }

  .photo-ring-inner {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: #fff;
    z-index: 2;
  }

  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .photo-circle {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    z-index: 3;
  }

  .photo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .photo-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.35) 0%, transparent 70%);
    z-index: 0;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.08); }
  }

  /* Caption */
  .caption { text-align: center; padding: 0 8px; }

  .caption-name {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #DAA520, #FFD700, #FFF8DC, #DAA520);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .caption-divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #DAA520, #FFD700);
    margin: 0 auto 12px;
    border-radius: 2px;
  }

  .caption-text {
    font-size: 15px;
    line-height: 1.7;
    color: #333;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .caption-text em {
    color: #B8860B;
    font-style: normal;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="stars-bg" id="stars"></div>

<div class="content">
  <div class="photo-wrapper">
    <div class="photo-glow"></div>
    <div class="photo-ring"></div>
    <div class="photo-ring-inner"></div>
    <div class="photo-circle">
      <img src="photo.jpg" alt="Ерасыл">
    </div>
  </div>

  <div class="caption">
    <div class="caption-name">Ерасыл</div>
    <div class="caption-divider"></div>
    <div class="caption-text">
      Непризнанный <em>гений стратегии</em><br>
      Лидер команды<br>
      <em>Двукратный чемпион</em> по КС&nbsp;2
    </div>
  </div>
</div>

<script>
  const container = document.getElementById('stars');
  const colors = ['#FFD700','#DAA520','#FFF8DC','#B8860B','#FFE066'];
  const sizes  = [30, 45, 60, 80, 100];

  function createStar() {
    const div  = document.createElement('div');
    div.className = 'star';
    const size     = sizes[Math.floor(Math.random() * sizes.length)];
    const color    = colors[Math.floor(Math.random() * colors.length)];
    const left     = Math.random() * 100;
    const duration = 6 + Math.random() * 10;
    const delay    = Math.random() * 12;

    div.style.cssText = `
      left: ${left}%;
      bottom: -${size}px;
      width: ${size}px;
      height: ${size}px;
      animation-duration: ${duration}s;
      animation-delay: -${delay}s;
    `;

    div.innerHTML = `<svg viewBox="0 0 51 48" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
      <path d="M25.5 2l5.9 17.9H50l-15.3 11.1 5.9 17.9L25.5 37.8l-15.1 11.1 5.9-17.9L1 20h18.6z"
        fill="none" stroke="${color}" stroke-width="2.5" opacity="0.85"/>
    </svg>`;

    container.appendChild(div);
    setTimeout(() => div.remove(), (duration + delay) * 1000);
  }

  for (let i = 0; i < 18; i++) createStar();
  setInterval(createStar, 700);
</script>
</body>
</html>
